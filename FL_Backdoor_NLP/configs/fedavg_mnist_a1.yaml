# configs/fedavg_fmnist.yaml
# FedAvg Baseline — FashionMNIST
# Run: python run_experiment.py --config configs/fedavg_mnist_a1.yaml

experiment_name: fedavg_mnist_10clients_a1_r30
dataset: mnist
num_clients: 10
client_fraction: 0.5
local_epochs: 5
batch_size: 32
learning_rate: 0.01
momentum: 0.9
num_rounds: 30
alpha: 1
seed: 42
data_dir: ./data
is_backdoor: false
num_adversaries: 0
